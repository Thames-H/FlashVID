dataset_path: parquet
dataset_kwargs:
  data_files:
    testdev: /root/autodl-tmp/benchmark/GQA/testdev_balanced_instructions/testdev-00000-of-00001.parquet
  cache_dir: /root/autodl-tmp/benchmark/GQA
  token: False
task: "gqa"
test_split: testdev
output_type: generate_until
doc_to_visual: !function utils.gqa_doc_to_visual
doc_to_text: !function utils.gqa_doc_to_text
doc_to_target: "answer"
process_docs: !function utils.gqa_process_docs
generation_kwargs:
  max_new_tokens: 16
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
metadata:
  - version: 0.0
  
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer the question using a single word or phrase."
  qwen_vl:
    pre_prompt: ""
    post_prompt: " Answer:"
